name: Keep Streak Green

on:
  schedule:
    # Runs automatically every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: {} # Allows you to manually trigger it from the Actions tab

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Roll Dice
        id: dice
        run: |
          RANDOM_NUM=$((RANDOM % 100))
          if [ $RANDOM_NUM -lt 80 ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            echo "Dice roll successful ($RANDOM_NUM). Will commit today."
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Dice roll failed ($RANDOM_NUM). Skipping commit today."
          fi
        shell: bash

      - name: Random delay
        if: steps.dice.outputs.run == 'true'
        run: |
          DELAY=$((RANDOM % 10800 + 1))
          echo "Sleeping for $DELAY seconds to randomize commit time..."
          sleep $DELAY

      - name: Checkout repository
        if: steps.dice.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Update keepalive file
        if: steps.dice.outputs.run == 'true'
        run: |
          echo "$(date -u) — heartbeat" >> .keepalive

      - name: Commit and Push
        if: steps.dice.outputs.run == 'true'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add .keepalive
          git commit -m "chore: activity heartbeat $(date -u)"
          # Pull remote changes first to avoid rejection when runs overlap
          git pull --rebase origin main
          git push
